# ============================================================
# Docker Compose — local development stack
# Services: backend (Express + TS) + MySQL 8 + Adminer
# Data persists in a named volume across restarts.
# ============================================================

services:
  # ----------------------------------------------------------
  # MySQL database
  # ----------------------------------------------------------
  db:
    image: mysql:8.0
    container_name: fullstack-starter-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s

  # ----------------------------------------------------------
  # Adminer — lightweight web UI for the DB
  # ----------------------------------------------------------
  adminer:
    image: adminer:latest
    container_name: fullstack-starter-adminer
    restart: unless-stopped
    environment:
      ADMINER_DEFAULT_SERVER: db
    ports:
      - "${ADMINER_PORT}:8080"
    depends_on:
      db:
        condition: service_healthy

  # ----------------------------------------------------------
  # Backend — Express + TypeScript (development mode)
  # ----------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fullstack-starter-backend
    restart: unless-stopped

    environment:
      # Server
      PORT: 3000
      CHOKIDAR_USEPOLLING: "true"

      # Database — backend talks to MySQL inside the Compose network,
      # so the host is the service name `db` and the port is MySQL's
      # internal 3306 (NOT the host-mapped DB_PORT).
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}

    ports:
      - "${BACKEND_PORT}:3000"

    volumes:
      - ./backend:/app
      - /app/node_modules

    # Wait until MySQL is healthy before starting the backend.
    # Without this, the first query would race against MySQL
    # init and fail with "Connection refused".
    depends_on:
      db:
        condition: service_healthy

# ============================================================
# Named volumes
# ============================================================
volumes:
  db_data:
