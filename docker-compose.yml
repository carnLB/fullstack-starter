# ============================================================
# Docker Compose — local development stack
# Services: backend (Express + TS) + MySQL 8 + Adminer
# Data persists in a named volume across restarts.
# ============================================================

services:
  # ----------------------------------------------------------
  # MySQL database
  # ----------------------------------------------------------
  db:
    image: mysql:8.0
    container_name: fullstack-starter-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s

  # ----------------------------------------------------------
  # Adminer — lightweight web UI for the DB
  # ----------------------------------------------------------
  adminer:
    image: adminer:latest
    container_name: fullstack-starter-adminer
    restart: unless-stopped
    environment:
      ADMINER_DEFAULT_SERVER: db
    ports:
      - "${ADMINER_PORT}:8080"
    depends_on:
      db:
        condition: service_healthy

  # ----------------------------------------------------------
  # Backend — Express + TypeScript (development mode)
  # Built from ./backend/Dockerfile.
  # Source code is bind-mounted for hot reload via tsx watch.
  # ----------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fullstack-starter-backend
    restart: unless-stopped

    # PORT inside the container. The Express app reads process.env.PORT.
    environment:
      PORT: 3000
      CHOKIDAR_USEPOLLING: "true"

    # Map host BACKEND_PORT -> container 3000.
    # Container always listens on 3000 (matches Dockerfile's EXPOSE).
    ports:
      - "${BACKEND_PORT}:3000"

    # Volume strategy:
    #   1) Bind-mount the source folder so file edits on the host
    #      are visible inside the container (hot reload).
    #   2) Anonymous volume on /app/node_modules so the container's
    #      Linux-built node_modules is NOT overwritten by the host's
    #      (potentially Windows-built) node_modules.
    volumes:
      - ./backend:/app
      - /app/node_modules

# ============================================================
# Named volumes
# ============================================================
volumes:
  db_data:
